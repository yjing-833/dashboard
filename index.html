<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}
.header{
    background:#1e88e5;
    color:white;
    padding:15px;
    text-align:center;
}
.container{
    display:flex;
    gap:20px;
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    flex:1;
}
</style>
</head>

<body>

<div class="header">
<h2>My Dashboard</h2>
</div>

<div class="container">

<div class="card">
<h3>Users</h3>
<p>120</p>
</div>

<div class="card">
<h3>Sales</h3>
<p>$5300</p>
</div>

<div class="card">
<h3>Orders</h3>
<p>75</p>
</div>

</div>

</body>
</html>
