<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL_INTERFACE // PORTFOLIO_v4.0.2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="cyberpunk-theme">

    <canvas id="matrix-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
    <canvas id="mouse-trail-canvas"></canvas>

    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <main class="ui-wrapper">
        <section class="profile-container" id="profile-card">
            <div class="glitch-wrapper">
                <div class="profile-avatar-container">
                    <img src="https://i.imgur.com/8K6m69u.png" alt="User Avatar" class="profile-avatar" id="avatar">
                    <div class="avatar-glow"></div>
                </div>
                <h1 class="glitch-text" data-text="CYBER_GHOST_01">CYBER_GHOST_01</h1>
            </div>

            <p class="role-tagline">> FULL-STACK_REPLICANT // DEVOPS_NOMAD</p>

            <div class="bio-section">
                <p id="typing-bio"></p>
            </div>

            <nav class="social-links">
                <a href="#" class="neon-btn">
                    <span class="btn-text">GITHUB</span>
                    <span class="btn-flare"></span>
                </a>
                <a href="#" class="neon-btn">
                    <span class="btn-text">PROJECTS</span>
                    <span class="btn-flare"></span>
                </a>
                <a href="#" class="neon-btn">
                    <span class="btn-text">CONTACT</span>
                    <span class="btn-flare"></span>
                </a>
            </nav>
        </section>

        <aside class="terminal-panel" id="terminal">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="terminal-title">SYSTEM_CONSOLE v9.8.0</span>
            </div>
            <div class="terminal-body" id="terminal-content">
                </div>
        </aside>

        <div class="data-decal top-right">LATENCY: 12ms</div>
        <div class="data-decal bottom-left">SECURE_CHANNEL: ENCRYPTED</div>
    </main>

    <script src="particles.js"></script>
    <script src="effects.js"></script>
    <script src="main.js"></script>
</body>
</html>
